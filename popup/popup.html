<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HH Grade Analyzer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 350px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
    }
    .header p {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
    }
    .stat-card {
      background: #16213e;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-card .number {
      font-size: 24px;
      font-weight: 700;
      color: #38f9d7;
    }
    .stat-card .label {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    .history {
      padding: 0 12px 12px;
    }
    .history h2 {
      font-size: 14px;
      margin-bottom: 8px;
      color: #aaa;
    }
    .history-list {
      max-height: 200px;
      overflow-y: auto;
    }
    .history-item {
      background: #16213e;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-item .grade-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
    }
    .grade-intern { background: #667eea; }
    .grade-junior { background: #43e97b; color: #000; }
    .grade-middle { background: #fa709a; }
    .grade-senior { background: #f5576c; }
    .grade-lead { background: #4facfe; color: #000; }
    
    .btn {
      display: block;
      width: calc(100% - 24px);
      margin: 0 12px 12px;
      padding: 10px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      transition: background 0.2s;
    }
    .btn:hover { background: #c23152; }
    .btn.clear { background: #333; }
    .btn.clear:hover { background: #555; }
    .empty-state {
      text-align: center;
      color: #666;
      padding: 20px;
      font-size: 13px;
    }
    .footer {
      padding: 8px 12px;
      text-align: center;
      font-size: 10px;
      color: #555;
      border-top: 1px solid #333;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔍 HH Grade Analyzer</h1>
    <p>Автоопределение уровня вакансий hh.ru</p>
  </div>
  
  <div class="stats">
    <div class="stat-card">
      <div class="number" id="totalCount">0</div>
      <div class="label">Всего проверено</div>
    </div>
    <div class="stat-card">
      <div class="number" id="todayCount">0</div>
      <div class="label">За сегодня</div>
    </div>
  </div>
  
  <div class="history">
    <h2>📋 Последние вакансии</h2>
    <div class="history-list" id="historyList">
      <div class="empty-state">Откройте вакансию на hh.ru</div>
    </div>
  </div>
  
  <button class="btn clear" id="clearBtn">Очистить историю</button>
  
  <div class="footer">
    HH Grade Analyzer v1.0 | Alex767
  </div>

  <script src="popup.js"></script>
</body>
</html>
